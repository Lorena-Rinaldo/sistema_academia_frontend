<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>IRON GYM | Check-in</title>
    <style>
        :root {
            --gym-black: #0f0f10;
            --gym-gold: #c5a059;
            --gym-white: #e5e5e5;
        }
        body { touch-action: manipulation; user-select: none; }
    </style>
</head>

<body class="bg-[#0f0f10] text-[#e5e5e5] min-h-screen flex flex-col font-sans overflow-hidden">

    <header class="w-full flex justify-between items-center px-10 py-10 border-b border-[#c5a059]/20 bg-black/40 backdrop-blur-md">
        <div>
            <h1 class="text-5xl font-black tracking-tighter text-[#c5a059] uppercase italic"> 
                IRON <span class="text-[#e5e5e5]">GYM</span> 
            </h1>
            <p class="text-[10px] tracking-[0.3em] text-[#c5a059]/60 uppercase font-bold">Unidade High Performance</p>
        </div>

        <div class="text-right font-mono border-l border-[#c5a059]/30 pl-8">
            <div id="data" class="text-sm font-light tracking-widest text-[#e5e5e5] opacity-70">--/--/----</div>
            <div id="hora" class="text-2xl font-bold text-[#c5a059]">00:00:00</div>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6">
  
        <div class="w-full max-w-xl mb-12">
            <label for="cpf-input" class="block text-[#c5a059] text-1xl font-black mb-4 uppercase tracking-[0.4em] text-center">
                Identificação do Aluno (CPF)
            </label>
            
            <div class="relative">
                <input 
                    type="text" 
                    id="cpf-input" 
                    placeholder="000.000.000-00"
                    readonly
                    class="w-full h-32 text-5xl font-mono text-center tracking-[0.1em] text-[#e5e5e5] bg-black/50 border-2 border-[#c5a059] rounded-2xl shadow-[0_0_20px_rgba(197,160,89,0.15)] focus:outline-none placeholder:text-zinc-800 transition-all"
                >
            </div>

            <p class="mt-6 text-center text-zinc-500 text-sm uppercase tracking-widest animate-pulse">
                Use o teclado numérico para acessar
            </p>
        </div>

        <div class="grid grid-cols-3 gap-6 w-full max-w-md">
    
            <button onclick="digitar('1')" class="btn-num border-[#c5a059]">1</button>
            <button onclick="digitar('2')" class="btn-num border-[#c5a059]">2</button>
            <button onclick="digitar('3')" class="btn-num border-[#c5a059]">3</button>
            
            <button onclick="digitar('4')" class="btn-num border-[#c5a059]">4</button>
            <button onclick="digitar('5')" class="btn-num border-[#c5a059]">5</button>
            <button onclick="digitar('6')" class="btn-num border-[#c5a059]">6</button>
            
            <button onclick="digitar('7')" class="btn-num border-[#c5a059]">7</button>
            <button onclick="digitar('8')" class="btn-num border-[#c5a059]">8</button>
            <button onclick="digitar('9')" class="btn-num border-[#c5a059]">9</button>
            
            <button onclick="limpar()" class="h-24 bg-red-900/10 border border-red-2100 text-red-500/50 rounded-2xl text-xl font-bold active:scale-95 transition-all"> AC </button>

            <button onclick="digitar('0')" class="btn-num border-[#c5a059]">0</button>

            <button onclick="apagarUltimo()" class="h-24 bg-zinc-900/50 border border-zinc-800 rounded-2xl text-[#e5e5e5] active:border-[#c5a059] active:scale-95 transition-all flex items-center justify-center"> <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg></button>

            <button onclick="validarCpf()" class="col-span-3 h-20 mt-2 border-2 border-[#c5a059] bg-[#c5a059]/10 text-[#c5a059] rounded-2xl text-2xl font-black uppercase tracking-[0.2em]"> Confirmar Check-in</button>

        </div>

    </main>

    <footer class="w-full py-4 px-10 bg-black/60 border-t border-[#c5a059]/10">
        <div class="flex items-center justify-center"> 
            <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">
                Terminais de Acesso <span class="text-[#c5a059] mx-2">//</span> 
                <span class="text-zinc-400">Desenvolvido por: Isabelly Ferreira e Lorena Rinaldo</span>
            </p>
        </div>
    </footer>

    <style type="text/tailwindcss">
        @layer components {
            .btn-num {
                /* Removido active:bg-[#c5a059] e active:text-black */
                @apply h-24 bg-zinc-900/50 border border-zinc-800 rounded-2xl text-4xl font-light text-[#e5e5e5] 
                active:border-[#c5a059] active:scale-95 transition-all shadow-xl;
            }
        }
    </style>

    <script>
        function atualizarHeader() {
            const agora = new Date();
            document.getElementById('data').textContent = agora.toLocaleDateString('pt-BR');
            document.getElementById('hora').textContent = agora.toLocaleTimeString('pt-BR');
        }

        setInterval(atualizarHeader, 1000);
        atualizarHeader();

        const inputCpf = document.getElementById('cpf-input');

        function digitar(num) {
            if (inputCpf.value.replace(/\D/g, '').length < 11) {
                const rawValue = inputCpf.value.replace(/\D/g, '') + num;
                inputCpf.value = formatarCPF(rawValue);
            }
        }

        function limpar() {
            inputCpf.value = "";
        }

        function formatarCPF(v) {
            v = v.replace(/\D/g, "");
            if (v.length <= 3) return v;
            if (v.length <= 6) return v.replace(/(\d{3})(\d+)/, "$1.$2");
            if (v.length <= 9) return v.replace(/(\d{3})(\d{3})(\d+)/, "$1.$2.$3");
            return v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, "$1.$2.$3-$4");
        }

        function apagarUltimo() {
            const rawValue = inputCpf.value.replace(/\D/g, ''); // Pega só os números
            const novoValor = rawValue.slice(0, -1); // Remove o último
            inputCpf.value = formatarCPF(novoValor); // Formata de novo
        }
        
    </script>

</body>
</html>
